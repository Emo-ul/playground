<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotiv Studio — Discover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0b;--panel:#141416;--line:#26262a;--text:#f4f4f5;--muted:#9b9ba3;--dim:#66666e;--accent:#ff5c1a;--r:22px;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit}
  .stage{max-width:1280px;margin:0 auto;padding:34px 40px 80px}
  .tabs{display:flex;gap:6px;margin-bottom:30px}
  .tab{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:11px;font-size:13.5px;font-weight:600;color:var(--muted);transition:all .15s;text-decoration:none}
  .tab:hover{color:var(--text);background:var(--panel)}
  .tab.on{background:var(--panel);color:#fff}
  .tab .d{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:8px}
  .wordmark{font-size:13px;font-weight:800;letter-spacing:.22em;color:var(--dim)}
  .head h1{font-size:clamp(26px,3.4vw,38px);font-weight:800;letter-spacing:-.02em}
  .head-sub{color:var(--muted);font-size:15px;margin-bottom:30px}

  .bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:212px;gap:16px;grid-auto-flow:dense}
  @media(max-width:1080px){.bento{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.bento{grid-template-columns:1fr}}
  .tile{position:relative;border-radius:var(--r);overflow:hidden;text-align:left;background:var(--panel);isolation:isolate;transition:transform .25s cubic-bezier(.2,.8,.2,1),box-shadow .25s}
  .tile:hover{transform:scale(1.018);box-shadow:0 18px 50px rgba(0,0,0,.55);z-index:2}
  .tile:active{transform:scale(.995)}
  .tile.s22{grid-column:span 2;grid-row:span 2}
  .tile.s21{grid-column:span 2}
  .tile.s12{grid-row:span 2}
  @media(max-width:560px){.tile.s22,.tile.s21{grid-column:span 1}}
  .tile .bgimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:-1;transition:transform .5s cubic-bezier(.2,.8,.2,1)}
  .tile:hover .bgimg{transform:scale(1.05)}
  .tile .scrim{position:absolute;inset:0;z-index:0;background:linear-gradient(183deg,rgba(6,6,8,.15) 24%,rgba(6,6,8,.86) 88%)}
  .tile .inner{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:18px 20px}
  .toprow{display:flex;align-items:center;gap:8px}
  .pill{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border-radius:99px;background:rgba(10,10,12,.55);backdrop-filter:blur(8px);color:#fff}
  .pill.hot{background:var(--accent)}
  .pill.new{background:#2563eb}
  .vtag{margin-left:auto;font-size:10.5px;font-weight:700;color:#fff;background:rgba(10,10,12,.5);padding:5px 10px;border-radius:99px;backdrop-filter:blur(8px);display:flex;align-items:center;gap:5px}
  .vtag::before{content:"▶";color:var(--accent);font-size:8px}
  .tile h3{font-size:19px;font-weight:800;line-height:1.22;letter-spacing:-.01em;text-shadow:0 2px 16px rgba(0,0,0,.6)}
  .tile.s22 h3{font-size:29px}.tile.s21 h3{font-size:22px}
  .tile .sub{font-size:12.5px;color:rgba(255,255,255,.82);margin-top:6px;font-weight:500}
  .bignum{font-size:60px;font-weight:900;letter-spacing:-.04em;line-height:1;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.5)}

  /* drawer */
  .backdrop{position:fixed;inset:0;background:rgba(5,5,7,.62);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .28s;z-index:40}
  .backdrop.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(510px,100%);background:#101013;border-left:1px solid var(--line);transform:translateX(102%);transition:transform .34s cubic-bezier(.2,.8,.2,1);z-index:50;display:flex;flex-direction:column}
  .drawer.on{transform:translateX(0)}
  .d-top{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--line);min-height:56px}
  .d-top .k{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .d-back{display:none;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--muted);padding:7px 11px;border-radius:9px;border:1px solid var(--line);background:var(--panel);transition:all .15s}
  .d-back:hover{color:#fff;border-color:var(--muted)}
  .d-back.show{display:inline-flex}
  .d-close{margin-left:auto;width:34px;height:34px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:15px;transition:all .15s;flex:none}
  .d-close:hover{color:#fff;border-color:var(--muted)}
  .d-scroll{overflow-y:auto;flex:1;padding:24px 26px 30px}
  .d-media{border-radius:14px;overflow:hidden;margin:0 0 18px;background:#000}
  .d-media img{width:100%;display:block}
  .d-media .vwrap{position:relative;aspect-ratio:16/9;cursor:pointer}
  .d-media .vwrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .d-media .vwrap .pb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28)}
  .d-media .vwrap .pb span{width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;padding-left:3px;box-shadow:0 6px 24px rgba(255,92,26,.5)}
  .d-media iframe{width:100%;aspect-ratio:16/9;border:0;display:block}
  .d-hero{height:120px;border-radius:14px;margin-bottom:18px;background-size:cover;background-position:center;position:relative}
  .d-hero::after{content:"";position:absolute;inset:0;border-radius:14px;background:linear-gradient(160deg,transparent,rgba(6,6,8,.5))}
  .d-scroll h2{font-size:24px;font-weight:800;line-height:1.22;letter-spacing:-.015em;margin-bottom:14px}
  .d-scroll p{font-size:14.5px;line-height:1.7;color:#c9c9d1;margin-bottom:14px}
  .sect{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:24px 0 12px}
  .d-scroll ul.plain{list-style:none;margin-bottom:6px}
  .d-scroll ul.plain li{position:relative;padding:7px 0 7px 24px;font-size:14px;line-height:1.55;color:#c9c9d1}
  .d-scroll ul.plain li::before{content:"";position:absolute;left:3px;top:14px;width:7px;height:7px;border-radius:2px;background:var(--accent)}
  .d-scroll ol.steps{list-style:none;counter-reset:s;margin-bottom:6px}
  .d-scroll ol.steps li{position:relative;padding:9px 0 9px 36px;font-size:14px;line-height:1.6;color:#c9c9d1;counter-increment:s}
  .d-scroll ol.steps li::before{content:counter(s);position:absolute;left:0;top:8px;width:23px;height:23px;border-radius:7px;background:var(--accent);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .d-scroll ol.steps li code{background:#1c1c22;border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12.5px;color:#ffb08a}
  /* flowchart */
  .flow{margin:6px 0 4px}
  .fnode{position:relative;display:flex;gap:12px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .fconn{height:36px;width:34px;margin-left:14px;display:flex;align-items:center;justify-content:center}
  .fconn svg{display:block;filter:drop-shadow(0 0 7px rgba(255,92,26,.55))}
  .fnode .fi{width:34px;height:34px;flex:none;border-radius:9px;background:rgba(255,92,26,.14);color:#ffb08a;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800}
  .fnode .ft b{font-size:13.5px;font-weight:700;display:block;line-height:1.3}
  .fnode .ft span{font-size:12px;color:var(--muted);line-height:1.45;display:block;margin-top:2px}
  .fnode.branch{border-style:dashed;border-color:rgba(255,92,26,.4)}
  .docs a{display:flex;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;text-decoration:none;margin-bottom:8px;transition:all .15s;background:rgba(255,255,255,.015)}
  .docs a:hover{border-color:var(--accent);background:rgba(255,92,26,.08)}
  .docs a .di{font-size:15px}
  .docs a .dt{flex:1;font-size:13.5px;font-weight:600;color:#e7e7ee}
  .docs a .dg{font-size:11px;color:var(--dim)}
  .docs a .dx{color:var(--dim);font-size:13px}
  .note{display:flex;gap:10px;background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.3);border-radius:11px;padding:12px 14px;margin-top:14px;font-size:13px;line-height:1.55;color:#bcd0ff}
  .d-foot{padding:15px 26px 20px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
  .cta{display:flex;align-items:center;justify-content:center;gap:9px;background:var(--accent);color:#fff;font-weight:700;font-size:15px;padding:14px 20px;border-radius:12px;text-decoration:none;transition:all .15s;border:none;width:100%}
  .cta:hover{background:#ff6e35;transform:translateY(-1px);box-shadow:0 8px 26px rgba(255,92,26,.4)}
  .cta.ghost{background:var(--panel);border:1px solid var(--line);color:var(--text)}
  .cta.ghost:hover{background:#1b1b20;box-shadow:none;border-color:var(--muted)}
  .srclink{text-align:center;font-size:12px;color:var(--dim);text-decoration:none}
  .srclink:hover{color:var(--muted)}
</style>
</head>
<body>
<div class="stage">
  <nav class="tabs">
    <a class="tab on" href="emotiv-studio-home.html"><span class="d"></span> Discover</a>
    <a class="tab" href="emotiv-studio-experiments.html"><span>✦</span> Experiments</a>
    <a class="tab" href="emotiv-studio-quest.html"><span>◇</span> Brain Quest</a>
    <a class="tab" href="emotiv-studio-research.html"><span>◎</span> Research</a>
  </nav>
  <div class="head"><span class="wordmark">EMOTIV STUDIO</span><h1>What will you create?</h1></div>
  <div class="head-sub">Real stories from the community — and a step-by-step build guide behind every one. Pick a card, then hit Create.</div>
  <div class="bento" id="bento"></div>
</div>

<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true">
  <div class="d-top">
    <button class="d-back" id="d-back">‹ Back</button>
    <span class="k" id="d-kicker"></span>
    <button class="d-close" id="d-close" aria-label="Close">✕</button>
  </div>
  <div class="d-scroll" id="d-body"></div>
  <div class="d-foot" id="d-foot"></div>
</aside>

<script>
const PX=(id,w=940,h=560)=>`https://images.pexels.com/photos/${id}/pexels-photo-${id}.jpeg?auto=compress&cs=tinysrgb&w=${w}&h=${h}&dpr=1`;

/* ---------- GUIDES (opened by the Create button) ---------- */
const G={
 'mental-command':{
   title:'Train your first Mental Command',
   intro:'Every build on this screen stands on one skill: teaching Emotiv to recognise a single repeatable thought. Master it once — it takes an afternoon — and drones, games and apps become interchangeable endpoints.',
   flow:[['🎧','Headset on','Every contact dot green'],['✦','EmotivBCI','Mental Commands panel'],['◯','Neutral baseline','8 s of nothing in particular'],['➤','Train an action','One vivid thought, repeated'],['🧊','Cube test','Retrain what wobbles'],['⌘','Cortex com stream','Your thought, as an event']],
   need:['Any Emotiv headset (Insight, EPOC X, FLEX)','EMOTIV Launcher + EmotivBCI (or Studio)'],
   steps:['Fit the headset and wait for every contact dot to turn green — signal quality decides how fast training converges','Record <b>Neutral</b> first: 8 seconds of doing nothing in particular. This is the reference everything is compared against','Add one action — <b>Push</b> — and train it with one vivid, physical thought (imagine shoving a heavy door). Same image, every repetition','Alternate short training rounds with cube tests; 4–8 rounds is typical before the cube obeys on demand','Only then add a second command — two strong commands beat five mushy ones','Graduate: subscribe to the <code>com</code> stream via Cortex. From here your thought is just an event any script can listen for'],
   tips:['If accuracy plateaus, wipe the training data and start clean — bad repetitions poison the model','Stop while you\'re ahead: a tired brain trains a tired model'],
   docs:[['📘','EmotivBCI manual','Mental command training','https://emotiv.gitbook.io/emotivbci/'],['🧠','Mental Commands — knowledge base','How the algorithm works','https://www.emotiv.com/knowledge-base/mental-commands'],['⌘','Cortex API — Advanced BCI','com stream + training API','https://emotiv.gitbook.io/cortex-api/advanced-bci'],['▶','Emotiv Academy','Video walkthroughs','https://www.youtube.com/@EmotivAcademy']],
   video:'hK5fTYd9gZM'
 },
 'cortex':{
   title:'Build anything with the Cortex API',
   intro:'Cortex is the local WebSocket service every Emotiv integration talks to. Learn one handshake — authorize, session, subscribe — and any stream of your brain data arrives in your code as JSON.',
   flow:[['🔑','Register app','client id + secret'],['🔌','Connect','wss://localhost:6868'],['🤝','authorize','Approve once in Launcher'],['🎧','createSession','Bind your headset'],['📡','subscribe','pow · met · com · fac · eeg'],['{ }','JSON out','Route it anywhere']],
   need:['An EMOTIV account','A registered Cortex app (client id + secret)','EMOTIV Launcher running with a headset','Node.js or Python'],
   steps:['Register a Cortex app at <b>account.emotiv.com</b> — the client id + secret identify your build','Open a WebSocket to <code>wss://localhost:6868</code>; Cortex runs beside the Launcher, on the machine wearing the headset','Walk the handshake once: <code>requestAccess</code> (approve in Launcher) → <code>authorize</code> → <code>createSession</code>','Subscribe only to what the project needs: <code>met</code> for cognitive metrics, <code>com</code> for trained commands, <code>fac</code> for expressions, <code>pow</code> for band power, <code>eeg</code> for raw signal','Treat every incoming JSON array as an event and route it — a keypress, a MIDI note, an HTTP call, a database row','Keep <b>Emotiv/cortex-example</b> open beside you; each pattern above already exists there in Node, Python and Unity'],
   tips:['Metrics and commands need no licence; raw EEG does','The Launcher must stay running — Cortex lives locally, not in the cloud'],
   docs:[['⌘','Cortex API documentation','Full reference','https://emotiv.gitbook.io/cortex-api/'],['🔑','Authentication','requestAccess → authorize','https://emotiv.gitbook.io/cortex-api/authentication'],['📡','Data subscription','pow · met · com · fac · eeg','https://emotiv.gitbook.io/cortex-api/data-subscription'],['🐙','Emotiv on GitHub','cortex-example (Node/Python/Unity)','https://github.com/Emotiv/cortex-example'],['🛠','Developer portal','Register + docs hub','https://www.emotiv.com/developer']]
 },
 'game-controller':{
   title:'Turn your thoughts into game controls',
   intro:'Perrikaryal cleared Elden Ring with trained commands mapped to attacks. The Emotiv translation: EmotivBCI supplies the events, a tiny key-emulation script supplies the game — the game itself never knows.',
   flow:[['✦','Train','2–4 commands + 1 expression'],['⌘','Cortex','com + fac events'],['⌨','Bridge script','Event → keystroke'],['🎮','Game','Reads keys, plays normally']],
   need:['EPOC X or Insight','EmotivBCI','Python + a key-emulation lib (pynput / keyboard)','A game that reads the keyboard'],
   steps:['Choose your verbs: deliberate actions to Mental Commands (Push = attack, Pull = dodge), the time-critical one to a facial expression (clench = heal)','Train in EmotivBCI until the cube obeys every command on demand — the game will be harsher than the cube','Write the bridge: subscribe to <code>com</code> + <code>fac</code>; when an event\'s power crosses your threshold, emit the mapped key with <code>pynput</code>','Debounce: one thought = one press. A half-second cooldown prevents accidental button-mashing','Tune thresholds on a pausable or turn-based game first, then climb the difficulty ladder'],
   tips:['Expressions fire in ~100 ms — keep them for reflexes','Hybrid control (thoughts + a regular gamepad) is how long sessions survive'],
   docs:[['⌘','Cortex — Advanced BCI','com + fac in code','https://emotiv.gitbook.io/cortex-api/advanced-bci'],['📘','EmotivBCI manual','Training profiles','https://emotiv.gitbook.io/emotivbci/'],['🐙','cortex-example','Working code samples','https://github.com/Emotiv/cortex-example'],['▶','Emotiv Academy','BCI build videos','https://www.youtube.com/@EmotivAcademy']]
 },
 'visualise':{
   title:'Turn your brainwaves into live visuals',
   intro:'Brainstorms projected audience brains onto domes; Mood Roads turned a drive into generative art. On Emotiv the whole pipeline is one stream and one mapping: band power in, pixels out.',
   flow:[['🎧','Headset','Live EEG'],['📡','Cortex pow','Bands per sensor, ~2×/sec'],['🎚','Normalise','Rolling 0–1 per band'],['🎨','Map','Colour · size · motion'],['🖥','Render','p5.js / TouchDesigner']],
   need:['Any headset','Cortex app (or BrainViz for the no-code route)','A visual runtime — p5.js in the browser is easiest'],
   steps:['Zero-code proof first: open <b>BrainViz</b> and watch your bands render live — it calibrates your intuition for the data','For your own visuals, subscribe to <code>pow</code>: theta through gamma, per sensor, several times a second','Normalise each band against its own rolling min/max — absolute values drift, ratios stay expressive','Make the artistic decision explicit: alpha → colour temperature, beta → particle speed, theta → bloom','Render in a p5.js draw loop, or send OSC into TouchDesigner when you want projection-grade output','Record screen and session together — replaying a strong emotional moment is the demo that sells the piece'],
   tips:['Smooth every mapped value; raw bands flicker','Design for the eyes-closed alpha surge — it\'s the most theatrical effect you get for free'],
   docs:[['🖼','EMOTIV BrainViz','No-code brain visuals','https://www.emotiv.com/emotiv-brainviz'],['📡','Cortex — Data subscription','pow band power','https://emotiv.gitbook.io/cortex-api/data-subscription'],['🔗','Lab Streaming Layer','Sync to other tools','https://www.emotiv.com/blog/emotiv-lab-streaming-layer-lsl'],['▶','Emotiv Academy','Creative build videos','https://www.youtube.com/@EmotivAcademy']]
 },
 'music':{
   title:'Make music with your mind',
   intro:'AngieC played the legendary TONTO synthesizer from her EEG; the MindTunes crew wrote a whole track this way. On Emotiv it\'s metrics-to-MIDI: your mental state becomes a control voltage.',
   flow:[['🎧','Headset','met / pow streams'],['🔌','Bridge','mido, a few lines'],['🎛','Virtual MIDI port','IAC / loopMIDI'],['🎹','DAW','CC → any parameter']],
   need:['Any headset','Cortex app','A virtual MIDI port (loopMIDI on Windows, IAC on macOS)','Python <code>mido</code> + a DAW or synth'],
   steps:['Create a virtual MIDI port (IAC on macOS, loopMIDI on Windows) — to the DAW, your brain is just another controller','Subscribe to <code>met</code>: engagement and relaxation move slowly and musically, ideal for performance control','Map metric → MIDI CC with <code>mido</code>, smoothed with a moving average so the sound breathes instead of jitters','Assign the CC in your DAW: relaxation → filter cutoff, engagement → reverb size','Then perform it: close your eyes, drop your shoulders, and hear the mix follow your state'],
   tips:['Map one parameter beautifully before adding a second','Slow metrics make music; raw bands make noise'],
   docs:[['📡','Cortex — Data subscription','met + pow streams','https://emotiv.gitbook.io/cortex-api/data-subscription'],['🎹','mido (Python MIDI)','Send MIDI from code','https://mido.readthedocs.io/'],['🔗','Lab Streaming Layer','Tight audio sync','https://www.emotiv.com/blog/emotiv-lab-streaming-layer-lsl'],['▶','Emotiv Academy','Music BCI videos','https://www.youtube.com/@EmotivAcademy']]
 },
 'attention':{
   title:'Measure focus & attention in real time',
   intro:'The attention-powered car braked when its driver drifted. Strip away the car and you have the most reusable pattern on this screen: read the Attention metric, set a personal threshold, react.',
   flow:[['🎧','Headset','met stream'],['📈','Attention 0–1','Several readings/sec'],['⚖','Threshold','Calibrated on you'],['⚡','Reaction','Alert · log · device']],
   need:['Any headset','Cortex app (the met stream is licence-free)'],
   steps:['Subscribe to <code>met</code> and log attention through one normal work hour — that log is your personal baseline','Find your two numbers: deep-work median and distracted median. Your threshold lives between them, not in someone else\'s paper','Wire a reaction: a notification when you drift, a paused video, a dimmed smart bulb — anything with an API','Chart a full day; the shape (morning peak, post-lunch dip) is usually visible immediately','Optional hardware ending, like the car: throttle a device with attention as the dead-man\'s switch'],
   tips:['React to trends (30 s windows), not single readings','Recalibrate thresholds weekly — your baseline moves'],
   docs:[['📡','Cortex — Data subscription','met (Performance Metrics)','https://emotiv.gitbook.io/cortex-api/data-subscription'],['📊','EmotivPRO','Metrics + recording','https://www.emotiv.com/emotivpro'],['🛠','Developer portal','APIs + SDKs','https://www.emotiv.com/developer']]
 },
 'record-research':{
   title:'Record & export research-grade data',
   intro:'Behind 22,000+ scholarly works sits one unglamorous pipeline: clean recordings, precise event markers, standard exports. This is that pipeline, on EmotivPRO.',
   flow:[['🎧','Headset','Green before, during, after'],['⏺','EmotivPRO','Record + event markers'],['🧷','PsychoPy · LSL','ms-accurate stimuli'],['📤','Export','EDF / CSV'],['🔬','Analyse','MNE · EEGLAB · MATLAB']],
   need:['EPOC X or FLEX for broad coverage','EmotivPRO subscription (raw EEG export)','Optional: PsychoPy for precise stimulus timing'],
   steps:['Record in EmotivPRO with contact quality green before, during and after the session — reviewers look','Mark everything: an event marker at every stimulus onset is the difference between data and anecdote','For millisecond-critical designs, drive stimuli from PsychoPy and pipe markers in over LSL','Export EDF (universal) or CSV (quick to inspect); the file opens identically in MNE-Python, EEGLAB or MATLAB','Epoch around your markers and average — those are ERPs, the same figures the papers publish'],
   tips:['Record 2 minutes of eyes-open / eyes-closed baseline every session','Name files like you\'ll need them in two years — because you will'],
   docs:[['📊','EmotivPRO manual','Record + export','https://emotiv.gitbook.io/emotivpro-v3/'],['🔗','Lab Streaming Layer','PsychoPy + LSL','https://www.emotiv.com/blog/emotiv-lab-streaming-layer-lsl'],['📈','ERP tutorial','Marking a brain response','https://www.emotiv.com/blog/basics-of-event-related-potentials']]
 },
 'setup':{

function mediaHTML(m){

function openStory(t){
  currentTile=t;

  dBody.scrollTop=0;
}
function openDrawer(){drawer.classList.add('on');backdrop.classList.add('on');dBody.scrollTop=0;}
function closeDrawer(){drawer.classList.remove('on');backdrop.classList.remove('on');}
dBack.addEventListener('click',()=>openStory(currentTile));
document.getElementById('d-close').addEventListener('click',closeDrawer);
backdrop.addEventListener('click',closeDrawer);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});
</script>
</body>
</html>
