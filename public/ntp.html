<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh; background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    color: #202124;
  }
  .wrap { margin-top: 13vh; display: flex; flex-direction: column; align-items: center; width: 100%; }
  .glogo { height: 92px; margin-bottom: 30px; }
  .searchbar {
    width: min(561px, 84%); height: 46px; border: 1px solid #dfe1e5; border-radius: 24px;
    display: flex; align-items: center; padding: 0 8px 0 16px; gap: 10px; background: #fff;
  }
  .searchbar:hover, .searchbar:focus-within { box-shadow: 0 1px 6px rgba(32,33,36,0.28); border-color: transparent; }
  .searchbar input { flex: 1; border: 0; outline: 0; font-size: 16px; color: #202124; }
  .searchbar svg { flex: 0 0 auto; }
  .shortcuts { margin-top: 44px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
  .sc {
    width: 112px; padding: 12px 4px; border-radius: 8px; text-align: center; cursor: pointer;
  }
  .sc:hover { background: #f1f3f4; }
  .sc .bubble {
    width: 48px; height: 48px; border-radius: 50%; background: #f1f3f4;
    margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;
  }
  .sc:hover .bubble { background: #e8eaed; }
  .sc .bubble img { width: 24px; height: 24px; }
  .sc .bubble span { font-size: 20px; color: #5f6368; }
  .sc .label {
    font-size: 12.5px; color: #202124; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
</style>
</head>
<body>
  <div class="wrap">
    <img class="glogo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google" onerror="this.style.display='none'">
    <div class="searchbar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Search Google or type a URL" spellcheck="false">
      <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path fill="#34A853" d="M17 12a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-2.07A7 7 0 0 0 19 12h-2z"/></svg>
      <svg width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" fill="#4285F4"/><path fill="#EA4335" d="M12 2a10 10 0 0 0-8.66 5H12V2z" opacity=".9"/><path fill="#FBBC04" d="M3.34 7A10 10 0 0 0 5 18.5L9.5 12 3.34 7z" opacity=".9"/><path fill="#34A853" d="M5 18.5A10 10 0 0 0 22 12h-8l-9 6.5z" opacity=".9"/></svg>
    </div>
    <div class="shortcuts" id="shortcuts"></div>
  </div>
<script>
  const tiles = [
    { label: "Emotiv — Baseline", url: "/projects/hero/baseline/", title: "Emotiv — Hero (Baseline)" },
    { label: "Emotiv — CTA", url: "/projects/hero/cta/", title: "Emotiv — Hero (CTA)" }
  ];
  const wrap = document.getElementById("shortcuts");
  tiles.forEach(t => {
    const d = document.createElement("div");
    d.className = "sc";
    d.innerHTML = `<div class="bubble"><img src="/favicon.png" alt=""></div><div class="label">${t.label}</div>`;
    d.addEventListener("click", () => {
      parent.postMessage({ type: "pg-navigate", url: t.url, title: t.title, fav: "/favicon.png" }, "*");
    });
    wrap.appendChild(d);
  });
  const add = document.createElement("div");
  add.className = "sc";
  add.innerHTML = `<div class="bubble"><span>+</span></div><div class="label">Add shortcut</div>`;
  wrap.appendChild(add);
</script>
</body>
</html>
